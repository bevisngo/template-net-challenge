version: '3.8'

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: templatenet_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: templatenet_chat
      MYSQL_USER: chatuser
      MYSQL_PASSWORD: chatpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: templatenet_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API  (browser uses this for presigned URLs)
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: templatenet_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Runs once after MinIO is healthy: creates the bucket and sets CORS so
  # browsers can PUT files directly via presigned URLs
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./minio-cors.xml:/tmp/cors.xml:ro
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/templatenet-files &&
        mc cors set local/templatenet-files /tmp/cors.xml &&
        echo 'MinIO bucket and CORS ready.'
      "

  # ── Application ──────────────────────────────────────────────────────────────

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: templatenet_backend
    restart: unless-stopped
    env_file: ../backend/.env
    # These override .env values so services talk over the Docker network
    environment:
      DB_HOST: mysql
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_ENDPOINT: localhost
      QDRANT_HOST: qdrant
      NODE_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: templatenet_frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  minio_data:
  qdrant_data:
